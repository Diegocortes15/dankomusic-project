<!doctype html>
<html lang="es" data-screen-label="01 Website">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DANKØ · Peak Time Techno · Bogotá</title>

  <!-- Apply persisted theme before paint (avoids flash). -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('danko-theme');
        var ok = ['blue','cyan','purple','red','green','gold'].indexOf(t) !== -1;
        document.documentElement.setAttribute('data-theme', ok ? t : 'blue');
      } catch (e) { document.documentElement.setAttribute('data-theme', 'blue'); }
    })();
  </script>

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="sections.css">
  <link rel="stylesheet" href="redesign.css">
  <link rel="stylesheet" href="responsive.css">

  <!-- ============ PRELOADER (paints before any JS/JSX) ============ -->
  <style>
    #danko-loader {
      position: fixed; inset: 0; z-index: 9999;
      background: #050507;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 28px;
      font-family: 'Anton','Oswald',sans-serif;
      transition: opacity .6s cubic-bezier(.2,.7,.1,1), visibility .6s;
    }
    #danko-loader.is-done { opacity: 0; visibility: hidden; pointer-events: none; }
    #danko-loader::before {
      content: ""; position: absolute; left: 50%; top: 44%; transform: translate(-50%,-50%);
      width: min(70vw, 560px); height: min(70vw, 560px);
      background: radial-gradient(circle, rgba(var(--accent-rgb,47,123,255), .22), transparent 62%);
      filter: blur(8px); pointer-events: none;
    }
    .dl-wordmark {
      position: relative;
      font-size: clamp(64px, 14vw, 150px); line-height: .82;
      letter-spacing: -.02em; text-transform: uppercase;
      color: #fff;
      text-shadow: 0 0 38px rgba(var(--accent-rgb,47,123,255), .55), 0 0 90px rgba(var(--accent-rgb,47,123,255), .28);
    }
    .dl-wordmark .dl-fill {
      position: absolute; inset: 0; color: var(--accent, #2f7bff);
      clip-path: inset(100% 0 0 0);
      animation: dl-fill 2.2s cubic-bezier(.5,.1,.2,1) infinite alternate;
      text-shadow: 0 0 30px rgba(var(--accent-rgb,47,123,255), .8);
    }
    @keyframes dl-fill { from { clip-path: inset(100% 0 0 0); } to { clip-path: inset(0 0 0 0); } }

    .dl-eq { position: relative; display: flex; align-items: flex-end; gap: 5px; height: 34px; }
    .dl-eq i {
      width: 5px; background: var(--accent, #2f7bff); display: block;
      box-shadow: 0 0 12px rgba(var(--accent-rgb,47,123,255), .7);
      animation: dl-eq 1s ease-in-out infinite;
    }
    .dl-eq i:nth-child(1){ animation-delay: -.9s } .dl-eq i:nth-child(2){ animation-delay: -.7s }
    .dl-eq i:nth-child(3){ animation-delay: -.5s } .dl-eq i:nth-child(4){ animation-delay: -.3s }
    .dl-eq i:nth-child(5){ animation-delay: -.1s } .dl-eq i:nth-child(6){ animation-delay: -.6s }
    .dl-eq i:nth-child(7){ animation-delay: -.4s }
    @keyframes dl-eq { 0%,100%{ height: 7px } 50%{ height: 34px } }

    .dl-meta {
      position: relative; display: flex; align-items: center; gap: 12px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .28em;
      text-transform: uppercase; color: rgba(255,255,255,.5);
    }
    .dl-meta .dl-pct { color: var(--accent, #2f7bff); min-width: 42px; text-align: right; }
    .dl-meta .dl-dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,.3); }
    @media (prefers-reduced-motion: reduce) {
      .dl-fill, .dl-eq i { animation: none; }
      .dl-fill { clip-path: inset(0 0 0 0); }
    }
  </style>

  <!-- React 18 + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <!-- Preloader overlay — visible immediately, removed once React mounts -->
  <div id="danko-loader" aria-hidden="true">
    <div class="dl-wordmark">DANKØ<span class="dl-fill" aria-hidden="true">DANKØ</span></div>
    <div class="dl-eq"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
    <div class="dl-meta">
      <span>Peak Time Techno</span>
      <span class="dl-dot"></span>
      <span>Bogotá</span>
      <span class="dl-dot"></span>
      <span class="dl-pct" id="dl-pct">0%</span>
    </div>
  </div>
  <script>
    (function () {
      window.__dankoStart = performance.now();
      var pct = 0, el = document.getElementById('dl-pct');
      window.__dankoLoad = setInterval(function () {
        pct = Math.min(96, pct + Math.random() * 11);
        if (el) el.textContent = Math.floor(pct) + '%';
      }, 130);
      // Safety net: never let the loader trap the user.
      window.__dankoLoadFail = setTimeout(function () { window.dankoHideLoader && window.dankoHideLoader(); }, 6000);
    })();
    window.dankoHideLoader = function () {
      clearInterval(window.__dankoLoad); clearTimeout(window.__dankoLoadFail);
      var pctEl = document.getElementById('dl-pct'); if (pctEl) pctEl.textContent = '100%';
      var l = document.getElementById('danko-loader');
      if (l) { requestAnimationFrame(function () { l.classList.add('is-done'); setTimeout(function () { l.remove(); }, 700); }); }
    };
  </script>

  <div id="root"></div>

  <!-- plain-JS data + i18n (no JSX) -->
  <script src="i18n.js"></script>
  <script src="data.js"></script>

  <!-- shared atoms + motion + theme switcher (JSX) -->
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="motion.jsx"></script>
  <script type="text/babel" src="themes.js"></script>

  <!-- sections -->
  <script type="text/babel" src="Nav.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="Bio.jsx"></script>
  <script type="text/babel" src="Shows.jsx"></script>
  <script type="text/babel" src="Gallery.jsx"></script>
  <script type="text/babel" src="SoundCloud.jsx"></script>
  <script type="text/babel" src="Contact.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>

  <!-- entry -->
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
