<!doctype html>
<!-- @dsCard group="Type" name="Type · Mono (Tracklist)" subtitle="JetBrains Mono used for BPM/time" viewport="700x260" -->
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px; background: var(--ink-050); color: var(--fg); }
  .meta { font-family: var(--font-mono); font-size: 11px; letter-spacing: .15em; color: var(--fg-muted); text-transform: uppercase; margin-bottom: 12px; }
  .mono { font-family: 'JetBrains Mono', monospace; color: #e8e8ec; font-size: 14px; }
  .row { display: grid; grid-template-columns: 36px 56px 1fr 84px; gap: 16px; align-items: center; padding: 8px 0; border-bottom: 1px solid #2a2a31; }
  .row .idx { color: #6a6a74; }
  .row .bpm { color: #ff2a2a; }
  .row .title { color: #fff; text-transform: uppercase; letter-spacing: .05em; font-size: 13px; }
  .row .dur { color: #9a9aa3; text-align: right; font-size: 12px; }
</style></head>
<body>
  <div class="meta">MONO · JETBRAINS MONO · BPM / TIME / TRACK ID</div>

    <div class="row" style="border:none;"><span class="idx">04</span><span class="bpm">148</span><span class="title">PEAK TIME ID</span><span class="dur">04:30</span></div>
  </div>
</body></html>
