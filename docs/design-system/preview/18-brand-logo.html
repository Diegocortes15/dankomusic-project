<!doctype html>
<!-- @dsCard group="Brand" name="Brand · Logo" subtitle="Chrome D monogram + usage" viewport="700x260" -->
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px; background: #000; }
  .meta { font-family: 'JetBrains Mono'; font-size: 10px; color:#6a6a74; letter-spacing: .15em; text-transform: uppercase; margin-bottom: 14px; }
  .grid { display: grid; grid-template-columns: 240px 1fr; gap: 24px; align-items: center; }
  .logo-tile { background: #000; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border: 1px solid #2a2a31; padding: 24px; position: relative; }
  .logo-tile img { width: 100%; height: 100%; object-fit: contain; }
  .logo-tile.glow::after {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, rgba(255,42,42,.45), transparent 65%);
    pointer-events: none; mix-blend-mode: screen;
  }
  ul { list-style: none; padding: 0; margin: 0; font-family: 'JetBrains Mono'; font-size: 11px; color: #c8c8cf; letter-spacing: .1em; text-transform: uppercase; }
  ul li { padding: 4px 0; border-bottom: 1px solid #1a1a1f; }
  ul li span { color: #6a6a74; }
</style></head>
<body>
  <div class="meta">BRAND MARK · CHROME "D" MONOGRAM</div>
  <div class="grid">
    <div class="logo-tile glow"><img src="../assets/logo/danko_logo.jpeg" alt="DJ Danko logo"></div>
    <ul>
      <li><span>FILE</span> &nbsp; assets/logo/danko_logo.jpeg</li>
      <li><span>FORMAT</span> &nbsp; jpeg · ⚠️ no vector yet</li>
      <li><span>BG</span> &nbsp; pure black only (#000)</li>
      <li><span>MIN SIZE</span> &nbsp; 24px (nav)</li>
      <li><span>GLOW</span> &nbsp; red radial · hero only</li>
      <li><span>SAFE AREA</span> &nbsp; 1× monogram height all sides</li>
    </ul>
  </div>
</body></html>
