<!doctype html>
<!-- @dsCard group="Type" name="Type · Heading (Oswald)" subtitle="H1–H4, all-caps" viewport="700x280" -->
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px; background: var(--ink-050); color: var(--fg); }
  .meta { font-family: var(--font-mono); font-size: 11px; letter-spacing: .15em; color: var(--fg-muted); text-transform: uppercase; margin-bottom: 12px; }
  h1, h2, h3, h4 { font-family: 'Oswald', sans-serif; color: #fff; text-transform: uppercase; margin: 0; }
  h1 { font-size: 48px; font-weight: 700; line-height: 1.0; letter-spacing: -0.01em; }
  h2 { font-size: 32px; font-weight: 600; line-height: 1.05; }
  h3 { font-size: 22px; font-weight: 600; line-height: 1.15; }
  h4 { font-size: 16px; font-weight: 500; line-height: 1.25; letter-spacing: 0.04em; }
  .stack > * + * { margin-top: 10px; }
</style></head>
<body>
  <div class="meta">HEADING · OSWALD · 16→48</div>
  <div class="stack">
    <h1>PEAK TIME TECHNO</h1>
    <h2>PRÓXIMAS FECHAS</h2>
    <h3>RADIO BERLIN · BOGOTÁ</h3>
    <h4>SET LIST · 02:00 — 04:00</h4>
  </div>
</body></html>
