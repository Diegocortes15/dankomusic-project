<!doctype html>
<!-- @dsCard group="Components" name="Buttons" subtitle="Primary, ghost, chamfer, steel" viewport="700x260" -->
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 28px; background: var(--ink-050); }
  .row { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
  .row + .row { margin-top: 16px; }
  .lbl { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #6a6a74; letter-spacing: .15em; text-transform: uppercase; min-width: 80px; }

  button {
    font-family: 'Oswald', sans-serif;
    font-weight: 600; text-transform: uppercase; letter-spacing: .12em; font-size: 13px;
    padding: 14px 22px; border: none; cursor: pointer;
    transition: all 120ms cubic-bezier(.2,.7,.1,1);
  }
  .btn-primary { background: #ff2a2a; color: #fff; box-shadow: 0 0 0 1px rgba(255,42,42,.25), 0 0 24px rgba(255,42,42,.35); }
  .btn-primary:hover { background: #e60d2a; box-shadow: 0 0 0 1px rgba(255,42,42,.55), 0 0 36px rgba(255,42,42,.55); }
  .btn-ghost { background: transparent; color: #fff; border: 1px solid #fff; }
  .btn-ghost:hover { background:#ff2a2a; border-color:#ff2a2a; }
  .btn-steel {
    background: linear-gradient(180deg, #e5e5e8 0%, #b8b8bd 30%, #6a6a74 70%, #2a2a31 100%);
    color: #0a0a0c; box-shadow: 0 1px 0 rgba(255,255,255,.4) inset, 0 -1px 0 rgba(0,0,0,.6) inset;
  }
  .btn-chamfered {
    background: #ff2a2a; color: #fff;
    clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
  }
</style></head>
<body>
  <div class="row">
    <span class="lbl">PRIMARY</span>
    <button class="btn-primary">RESERVAR</button>
    <button class="btn-primary" style="background:#e60d2a;">HOVER</button>
    <button class="btn-primary" style="background:#b00018; transform:translateY(1px); box-shadow:0 0 0 1px rgba(255,42,42,.3);">PRESS</button>
  </div>
  <div class="row">
    <span class="lbl">GHOST</span>
    <button class="btn-ghost">ESCUCHAR SET</button>
    <button class="btn-ghost" style="background:#ff2a2a;border-color:#ff2a2a;">HOVER</button>
  </div>
  <div class="row">
    <span class="lbl">CHAMFER</span>
    <button class="btn-chamfered">TICKETS →</button>
    <span class="lbl">STEEL</span>
    <button class="btn-steel">DOWNLOAD EPK</button>
  </div>
</body></html>
