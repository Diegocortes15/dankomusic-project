<!doctype html>
<!-- @dsCard group="Components" name="Form Inputs" subtitle="Underline style, red focus" viewport="700x250" -->
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px; background: var(--ink-050); }
  .meta { font-family: 'JetBrains Mono'; font-size: 10px; color:#6a6a74; letter-spacing: .15em; text-transform: uppercase; margin-bottom: 14px; }
  label { display: block; font-family: 'JetBrains Mono'; font-size: 10px; letter-spacing: .15em; color: #9a9aa3; text-transform: uppercase; margin-bottom: 8px; }
  input, textarea {
    width: 100%; background: transparent; border: none; border-bottom: 1px solid #3d3d46;
    color: #fff; font-family: 'Inter'; font-size: 16px;
    padding: 10px 0; outline: none; transition: border-color 120ms;
  }
  input:focus, textarea:focus { border-bottom-color: #ff2a2a; }
  .field + .field { margin-top: 20px; }
  textarea { min-height: 60px; resize: none; }
  .stack { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
</style></head>
<body>
  <div class="meta">FORM INPUTS · UNDERLINE STYLE</div>
  <div class="stack">
    <div class="field">
      <label>NOMBRE / NAME</label>
      <input type="text" value="Booking Agency LATAM">
    </div>
    <div class="field">
      <label>EMAIL</label>
      <input type="email" placeholder="bookings@…">
    </div>
  </div>
  <div class="field" style="margin-top:20px;">
    <label>MENSAJE · FOCUSED</label>
    <textarea autofocus>Buscamos confirmar fecha en Berlín para octubre 2026…</textarea>
  </div>
</body></html>
