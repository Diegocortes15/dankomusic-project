<!doctype html>
<!-- @dsCard group="Colors" name="Color · Accents & Semantic" subtitle="Strobe amber, violet, success, warning" viewport="700x260" -->
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0; }
  .sw { height: 96px; border: 1px solid #2a2a31; display:flex; flex-direction:column; justify-content:space-between; padding:10px 12px; }
  .sw .n { font-family: var(--font-mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; font-weight: 700; }
  .sw .h { font-family: var(--font-mono); font-size: 10px; letter-spacing: .12em; opacity:.85; }
  .sw .role { font-family: var(--font-body); font-size: 11px; opacity:.7; }
</style></head>
<body>
  <div class="grid">
    <div class="sw" style="background:#ff8a14; color:#0a0a0c; box-shadow: 0 0 32px rgba(255,138,20,.35);">
      <div class="n">STROBE AMBER</div>
      <div class="role">Hot ember · used only as glow / blur accent</div>
      <div class="h">#FF8A14 · --strobe-amber</div>
    </div>
    <div class="sw" style="background:#6a2bff; color:#fff; box-shadow: 0 0 32px rgba(106,43,255,.35);">
      <div class="n">STROBE VIOLET</div>
      <div class="role">Counter-light · cooler photo accent</div>
      <div class="h">#6A2BFF · --strobe-violet</div>
    </div>
    <div class="sw" style="background:#2bd47a; color:#0a0a0c;">
      <div class="n">SUCCESS</div>
      <div class="role">RSVP confirmed / file uploaded</div>
      <div class="h">#2BD47A · --c-success</div>
    </div>
    <div class="sw" style="background:#ffb020; color:#0a0a0c;">
      <div class="n">WARNING</div>
      <div class="role">Show low-on-tickets, etc.</div>
      <div class="h">#FFB020 · --c-warning</div>
    </div>
  </div>
</body></html>
