<!doctype html>
<!-- @dsCard group="Colors" name="Color · Ink Neutrals" subtitle="Black-to-white canvas + surfaces" viewport="700x230" -->
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0; }
  .sw { height: 96px; border: 1px solid #2a2a31; display:flex; flex-direction:column; justify-content:flex-end; padding:8px 10px; }
  .sw .n { font-family: var(--font-mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; font-weight: 700; }
  .sw .h { font-family: var(--font-mono); font-size: 10px; letter-spacing: .12em; opacity:.6; }
</style></head>
<body>
  <div class="grid">
    <div class="sw" style="background:#000000;color:#fff;"><div class="n">INK 000</div><div class="h">#000 · void</div></div>
    <div class="sw" style="background:#0a0a0c;color:#fff;"><div class="n">INK 050</div><div class="h">#0A0A0C · page</div></div>
    <div class="sw" style="background:#111114;color:#fff;"><div class="n">INK 100</div><div class="h">#111114 · surface</div></div>
    <div class="sw" style="background:#1a1a1f;color:#fff;"><div class="n">INK 200</div><div class="h">#1A1A1F · card</div></div>
    <div class="sw" style="background:#2a2a31;color:#fff;"><div class="n">INK 300</div><div class="h">#2A2A31 · border</div></div>
    <div class="sw" style="background:#3d3d46;color:#fff;"><div class="n">INK 400</div><div class="h">#3D3D46</div></div>
    <div class="sw" style="background:#6a6a74;color:#fff;"><div class="n">INK 500</div><div class="h">#6A6A74 · muted</div></div>
    <div class="sw" style="background:#9a9aa3;color:#000;"><div class="n">INK 600</div><div class="h">#9A9AA3 · 2ndary</div></div>
    <div class="sw" style="background:#c8c8cf;color:#000;"><div class="n">INK 700</div><div class="h">#C8C8CF · body</div></div>
    <div class="sw" style="background:#e8e8ec;color:#000;"><div class="n">INK 800</div><div class="h">#E8E8EC · primary</div></div>
  </div>
</body></html>
