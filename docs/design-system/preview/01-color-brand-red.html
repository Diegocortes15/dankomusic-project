<!doctype html>
<!-- @dsCard group="Colors" name="Color · Brand (Electric Blue)" subtitle="Default accent #2F7BFF + theme system" viewport="700x300" -->
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px; }
  .big-glow {
    height: 120px; background: #2f7bff;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 12px;
    box-shadow: 0 0 40px rgba(47,123,255,.6);
  }
  .big-glow .name { font-family: var(--font-display); font-size: 28px; color: #fff; letter-spacing: .02em; }
  .big-glow .hex { font-family: var(--font-mono); font-size: 11px; color: rgba(255,255,255,.9); letter-spacing: .15em; text-transform: uppercase; }
  .themes { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0; margin-top: 12px; }
  .sw { height: 70px; display: flex; flex-direction: column; justify-content: flex-end; padding: 7px 8px; border: 1px solid #2a2a31; }
  .sw .n { font-family: var(--font-mono); font-size: 9px; letter-spacing: .1em; text-transform: uppercase; font-weight: 700; color: #0a0a0c; }
  .sw .h { font-family: var(--font-mono); font-size: 8px; letter-spacing: .08em; color: rgba(0,0,0,.65); }
  .cap { font-family: var(--font-mono); font-size: 10px; letter-spacing: .15em; color: #6a6a74; text-transform: uppercase; margin-top: 12px; }
</style>
</head>
<body>
  <div class="big-glow">
    <div class="name">ELECTRIC BLUE</div>
    <div class="hex">#2F7BFF · --accent · default theme</div>
  </div>
  <div class="cap">Switchable themes — accent swaps via [data-theme], persisted to localStorage</div>
  <div class="themes">
    <div class="sw" style="background:#2f7bff;"><div class="n" style="color:#fff;">BLUE</div><div class="h" style="color:rgba(255,255,255,.8);">#2F7BFF</div></div>
    <div class="sw" style="background:#00e5ff;"><div class="n">CYAN</div><div class="h">#00E5FF</div></div>
    <div class="sw" style="background:#8b5cff;"><div class="n" style="color:#fff;">PURPLE</div><div class="h" style="color:rgba(255,255,255,.8);">#8B5CFF</div></div>
    <div class="sw" style="background:#ff2a2a;"><div class="n" style="color:#fff;">RED</div><div class="h" style="color:rgba(255,255,255,.8);">#FF2A2A</div></div>
    <div class="sw" style="background:#62ff3b;"><div class="n">GREEN</div><div class="h">#62FF3B</div></div>
    <div class="sw" style="background:#ffb020;"><div class="n">GOLD</div><div class="h">#FFB020</div></div>
  </div>
</body></html>
